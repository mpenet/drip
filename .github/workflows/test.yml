name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-sqlite:
    name: SQLite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/drip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@10.0
        with:
          cli: latest
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('modules/drip/deps.edn') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Run tests
        run: clojure -M:test -m cognitect.test-runner

  test-mariadb:
    name: MariaDB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/drip
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: drip_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mariadb-admin ping -h 127.0.0.1 -u root -proot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@10.0
        with:
          cli: latest
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('modules/drip/deps.edn') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Run tests
        env:
          DRIP_TEST_JDBC_URL: jdbc:mariadb://127.0.0.1:3306/drip_test?user=root&password=root
        run: clojure -M:test-mariadb -m cognitect.test-runner

  test-postgres:
    name: PostgreSQL
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/drip
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: drip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@10.0
        with:
          cli: latest
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('modules/drip/deps.edn') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Run tests
        env:
          DRIP_TEST_JDBC_URL: jdbc:postgresql://127.0.0.1:5432/drip_test?user=postgres&password=postgres
        run: clojure -M:test-postgres -m cognitect.test-runner
